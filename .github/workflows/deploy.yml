name: Deploy Punk Rock Family Tree Quartz site to GitHub Pages

on:
  repository_dispatch:
    types: [dispatch-prft] # Triggered only when this type matches

permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Quartz 
        uses: actions/checkout@v6
        with:
	      repository: disctrict/quartz
		  ref: v4
      - name: Checkout Obsidian 
        uses: actions/checkout@v6
        with:
          repository: disctrict/prft-obsidian
          path: content
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

